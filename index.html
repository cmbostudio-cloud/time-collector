<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Time Collector</title>
  <style>
    :root {
      color-scheme: dark;
      --text: rgba(255, 248, 241, 0.98);
      --muted: rgba(255, 248, 241, 0.72);
      --card-blur: 14px;
      --card-opacity: 0.42;
      --frame-width: min(92vw, 560px, calc(92vh * 0.671));
      --frame-pad-x: clamp(20px, 4vw, 56px);
      --content-width: min(calc(var(--frame-width) - (var(--frame-pad-x) * 2)), 468px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: clip;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* Background sits behind everything */
    #bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-color: #0a0c10;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    body {
      display: grid;
      place-items: center;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 768px) {
      body { place-items: start center; padding-top: max(10px, env(safe-area-inset-top)); }
      .frame { padding-top: calc(14px + env(safe-area-inset-top)); }
      .ui { gap: 10px; }
    }

    .frame, .frame * { -webkit-user-select: none; user-select: none; }

    .frame[data-ui-theme="dark"] {
      --ui-panel-border: rgba(255,248,241,0.14);
      --ui-control-bg: rgba(12,12,14,0.28);
      --ui-control-border: rgba(255,248,241,0.14);
      --ui-text: rgba(255,248,241,0.98);
      --ui-muted: rgba(255,248,241,0.72);
      --ui-accent: #ffd9b7;
      --ui-active-bg: rgba(255,217,183,0.12);
      --ui-accent-border: rgba(255,217,183,0.34);
      --ui-accent-glow: rgba(255,217,183,0.22);
      --ui-slider-track: rgba(255,248,241,0.16);
      --ui-slider-thumb: rgba(255,248,241,0.92);
    }

    .frame[data-ui-theme="light"] {
      --ui-panel-border: rgba(28,28,32,0.08);
      --ui-control-bg: rgba(255,255,255,0.56);
      --ui-control-border: rgba(28,28,32,0.08);
      --ui-text: rgba(24,24,28,0.94);
      --ui-muted: rgba(24,24,28,0.64);
      --ui-accent: rgba(24,24,28,0.96);
      --ui-active-bg: rgba(24,24,28,0.08);
      --ui-accent-border: rgba(24,24,28,0.22);
      --ui-accent-glow: rgba(24,24,28,0.1);
      --ui-slider-track: rgba(24,24,28,0.18);
      --ui-slider-thumb: rgba(24,24,28,0.92);
    }

    .frame {
      position: relative;
      width: var(--frame-width);
      height: auto;
      aspect-ratio: 0.671;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding:
        calc(24px + env(safe-area-inset-top))
        var(--frame-pad-x)
        calc(24px + env(safe-area-inset-bottom))
        var(--frame-pad-x);
    }

    @media (min-width: 900px) {
      :root { --frame-pad-x: 24px; }
      .frame { padding: 24px; }
    }

    .ui {
      width: var(--content-width);
      display: grid;
      gap: 12px;
      align-content: start;
    }

    /* ── Topbar ── */
    .topbar {
      width: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(0.62rem, 0.9vw, 0.82rem);
      line-height: 1.02;
      letter-spacing: -0.03em;
      font-weight: 600;
      text-shadow: 0 2px 18px rgba(0,0,0,0.34);
    }

    /* ── Settings ── */
    .settings { position: relative; flex: 0 0 auto; }

    .settings-toggle {
      appearance: none;
      border: 1px solid var(--ui-control-border);
      background: var(--ui-control-bg);
      color: var(--ui-text);
      border-radius: 999px;
      padding: 7px 10px;
      font: inherit;
      font-size: 0.72rem;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .settings-panel {
      position: fixed;
      left: 50%;
      top: 50%;
      width: var(--content-width);
      height: min(92vh, 680px);
      transform: translate(-50%, -50%);
      padding: 12px;
      border-radius: 24px;
      border: 1px solid var(--ui-panel-border);
      background: rgba(var(--settings-panel-surface), var(--card-opacity));
      box-shadow: 0 28px 80px rgba(0,0,0,0.42);
      backdrop-filter: blur(var(--card-blur));
      -webkit-backdrop-filter: blur(var(--card-blur));
      display: none;
      z-index: 20;
      grid-template-rows: auto 1fr;
      gap: 12px;
      color: var(--ui-text);
      overflow: clip;
    }

    .frame[data-ui-theme="dark"] .settings-panel {
      --settings-panel-surface: 12,12,14;
      --settings-section-border: rgba(255,248,241,0.1);
      --settings-control-bg: rgba(12,12,14,0.28);
      --settings-control-border: rgba(255,248,241,0.14);
    }

    .frame[data-ui-theme="light"] .settings-panel {
      --settings-panel-surface: 255,247,241;
      --settings-section-border: rgba(28,28,32,0.08);
      --settings-control-bg: rgba(255,255,255,0.56);
      --settings-control-border: rgba(28,28,32,0.08);
    }

    .settings.open .settings-panel { display: grid; }

    .settings-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .settings-title {
      margin: 0;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .settings-close {
      appearance: none;
      border: 1px solid var(--settings-control-border);
      background: var(--settings-control-bg);
      color: var(--ui-text);
      border-radius: 999px;
      padding: 6px 9px;
      font: inherit;
      font-size: 0.64rem;
      line-height: 1;
      cursor: pointer;
    }

    /* sections */
    .settings-sections {
      scrollbar-width: none;
      -ms-overflow-style: none;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .settings-sections::-webkit-scrollbar { display: none; }

    .settings-section {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 12px 0;
      flex-shrink: 0;
    }

    .settings-section + .settings-section {
      border-top: 1px solid var(--settings-section-border);
    }

    .settings-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 7px 2px;
    }

    .settings-group--slider { gap: 12px; }
    .settings-group--slider .slider { flex: 1 1 0; }
    .settings-group--slider .slider-value {
      flex: 0 0 auto;
      text-align: right;
      min-width: 30px;
      color: var(--ui-muted);
      font-size: 0.62rem;
    }

    .settings-label {
      margin: 0;
      color: var(--ui-muted);
      font-size: 0.62rem;
      letter-spacing: 0.02em;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    /* lang / theme buttons */
    .lang-row, .theme-row { display: flex; gap: 6px; }

    .lang-btn, .theme-btn {
      appearance: none;
      border: 1px solid var(--settings-control-border);
      background: var(--settings-control-bg);
      color: var(--ui-text);
      border-radius: 12px;
      padding: 8px 10px;
      font: inherit;
      font-size: 0.64rem;
      line-height: 1;
      cursor: pointer;
    }

    .lang-btn.active, .theme-btn.active {
      border-color: var(--ui-accent-border);
      background: var(--ui-active-bg);
      color: var(--ui-accent);
    }

    /* accent dots */
    .accent-row { display: flex; gap: 10px; align-items: center; padding: 4px 2px; }

    .accent-btn {
      appearance: none;
      border: none;
      background: var(--accent-swatch);
      padding: 0; margin: 0;
      cursor: pointer;
      width: 14px; height: 14px;
      border-radius: 999px;
      box-shadow: 0 0 0 1.5px rgba(255,255,255,0.18);
      flex: 0 0 auto;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .accent-btn:hover { transform: scale(1.2); }

    .accent-btn.active {
      box-shadow:
        0 0 0 2.5px var(--ui-control-bg, #0c0c0e),
        0 0 0 4.5px var(--accent-swatch);
      transform: scale(1.1);
    }

    /* custom accent button */
    .accent-btn--custom {
      font-size: 9px;
      line-height: 14px;
      color: rgba(255,255,255,0.7);
      border: 1.5px dashed rgba(255,255,255,0.3) !important;
      background: transparent !important;
      box-shadow: none !important;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .accent-btn--custom.active {
      border-color: var(--ui-accent-border) !important;
      color: var(--ui-accent);
    }

    .custom-accent-row {
      gap: 6px !important;
      padding: 2px 2px 6px !important;
    }

    .custom-accent-hash {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--ui-muted);
      flex: 0 0 auto;
    }

    .custom-accent-input {
      flex: 1;
      padding: 7px 10px;
      border-radius: 10px;
      border: 1px solid var(--settings-control-border);
      background: var(--settings-control-bg);
      color: var(--ui-text);
      font: inherit;
      font-size: 0.68rem;
      font-family: monospace;
      letter-spacing: 0.06em;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
      transition: border-color 140ms ease;
    }

    .custom-accent-input:focus {
      border-color: var(--ui-accent-border);
    }

    .custom-accent-input.valid {
      border-color: rgba(100,220,130,0.6);
    }

    .custom-accent-apply {
      appearance: none;
      flex: 0 0 auto;
      border: 1px solid var(--ui-accent-border);
      background: var(--ui-active-bg);
      color: var(--ui-accent);
      border-radius: 10px;
      padding: 7px 10px;
      font: inherit;
      font-size: 0.62rem;
      font-weight: 700;
      cursor: pointer;
    }

    .custom-accent-error {
      margin: 0 2px 4px;
      font-size: 0.58rem;
      color: rgba(255,110,110,0.85);
    }

    /* background upload */
    .bg-btn-row { display: flex; gap: 6px; }

    .bg-upload-btn {
      appearance: none;
      border: 1px solid var(--settings-control-border);
      background: var(--settings-control-bg);
      color: var(--ui-text);
      border-radius: 12px;
      padding: 8px 10px;
      font: inherit;
      font-size: 0.64rem;
      line-height: 1;
      cursor: pointer;
    }

    .bg-reset-btn {
      appearance: none;
      border: 1px solid var(--settings-control-border);
      background: transparent;
      color: var(--ui-muted);
      border-radius: 12px;
      padding: 8px 10px;
      font: inherit;
      font-size: 0.64rem;
      line-height: 1;
      cursor: pointer;
    }

    /* slider */
    .slider {
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: var(--ui-slider-track);
      outline: none;
    }

    .slider::-webkit-slider-thumb {
      appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 1px solid var(--ui-accent-border);
      background: var(--ui-slider-thumb);
      box-shadow: 0 6px 14px rgba(0,0,0,0.2);
    }

    .slider::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 1px solid var(--ui-accent-border);
      background: var(--ui-slider-thumb);
      box-shadow: 0 6px 14px rgba(0,0,0,0.2);
    }

    /* ── Time card ── */
    .time-block { width: 100%; padding-top: 2px; }

    .time-card {
      width: 100%;
      display: grid;
      gap: 8px;
      padding: 12px 12px 10px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      background: rgba(var(--card-surface), var(--card-opacity));
      backdrop-filter: blur(var(--card-blur));
      -webkit-backdrop-filter: blur(var(--card-blur));
      box-shadow: 0 18px 48px rgba(0,0,0,0.16);
    }

    .time-card[data-theme="dark"] {
      --card-surface: 12,12,14;
      --card-border: rgba(255,248,241,0.12);
      --card-label: rgba(255,248,241,0.72);
      --card-accent: #ffd9b7;
    }

    .time-card[data-theme="light"] {
      --card-surface: 255,247,241;
      --card-border: rgba(255,255,255,0.34);
      --card-label: rgba(20,20,24,0.66);
      --card-accent: rgba(24,24,28,0.96);
    }

    /* time value row */
    .time-value-row {
      display: flex;
      align-items: baseline;
      gap: 5px;
    }

    .time {
      margin: 0;
      font-size: clamp(1.15rem, 2.4vw, 1.65rem);
      line-height: 0.92;
      font-weight: 800;
      letter-spacing: -0.06em;
      color: var(--ui-accent);
      text-shadow: 0 0 24px var(--ui-accent-glow), 0 2px 18px rgba(0,0,0,0.18);
      word-break: break-all;
    }

    .time-unit {
      margin: 0;
      font-size: clamp(0.56rem, 0.85vw, 0.7rem);
      font-weight: 600;
      color: var(--ui-accent);
      opacity: 0.65;
      letter-spacing: 0em;
      white-space: nowrap;
    }

    .rate {
      margin: 0;
      font-size: clamp(0.66rem, 1.0vw, 0.78rem);
      line-height: 1.35;
      color: var(--card-label);
      letter-spacing: -0.02em;
      text-shadow: 0 2px 14px rgba(0,0,0,0.2);
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      gap: 4px;
      padding: 4px;
      border-radius: 14px;
      background: rgba(0,0,0,0.18);
      border: 1px solid var(--card-border);
    }

    .tab-btn {
      appearance: none;
      flex: 1;
      border: none;
      background: transparent;
      color: var(--card-label);
      border-radius: 10px;
      padding: 7px 10px;
      font: inherit;
      font-size: 0.64rem;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease;
    }

    .tab-btn.active {
      background: var(--ui-active-bg);
      color: var(--ui-accent);
    }

    /* ── Tab panels ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Upgrade panel ── */
    .upgrade-panel {
      display: grid;
      gap: 8px;
      padding: 11px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        rgba(0,0,0,0.08);
    }

    .time-card[data-theme="light"] .upgrade-panel {
      border-color: rgba(24,24,28,0.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.58), rgba(255,255,255,0.38)),
        rgba(255,255,255,0.16);
    }

    .upgrade-copy { display: grid; gap: 3px; }

    .upgrade-title {
      margin: 0;
      font-size: 0.76rem;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--card-accent);
    }

    .upgrade-subtitle {
      margin: 0;
      font-size: 0.64rem;
      line-height: 1.35;
      color: var(--card-label);
      letter-spacing: -0.02em;
    }

    .upgrade-meta {
      font-size: 0.64rem;
      line-height: 1.35;
      color: var(--card-label);
      letter-spacing: -0.02em;
    }

    .upgrade-btn {
      appearance: none;
      border: 1px solid var(--ui-accent-border);
      background: var(--ui-active-bg);
      color: var(--ui-accent);
      border-radius: 12px;
      padding: 9px 10px;
      font: inherit;
      font-size: 0.66rem;
      line-height: 1;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    .upgrade-btn:hover:not(:disabled) { transform: translateY(-1px); }

    .upgrade-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }
    /* ── Save slots ── */
    .save-slot-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 2px 0 6px;
    }

    .save-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 4px 6px;
      border-radius: 14px;
      border: 1px solid var(--settings-control-border);
      background: var(--settings-control-bg);
    }

    .save-slot-label {
      font-size: 0.54rem;
      color: var(--ui-muted);
      letter-spacing: 0.02em;
    }

    .save-slot-time {
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--ui-accent);
      letter-spacing: -0.02em;
      min-height: 0.9em;
      text-align: center;
    }

    .save-slot-btns {
      display: flex;
      gap: 4px;
    }

    .save-slot-btns button {
      appearance: none;
      border: 1px solid var(--settings-control-border);
      background: transparent;
      color: var(--ui-text);
      border-radius: 8px;
      padding: 4px 6px;
      font: inherit;
      font-size: 0.56rem;
      line-height: 1;
      cursor: pointer;
    }

    .save-slot-btns button.is-save {
      border-color: var(--ui-accent-border);
      color: var(--ui-accent);
    }

    .save-slot-btns button:disabled {
      opacity: 0.38;
      cursor: not-allowed;
    }

    .save-status {
      font-size: 0.6rem !important;
      color: var(--ui-accent) !important;
      min-height: 1em;
      transition: opacity 0.3s;
    }

    .autosave-hint {
      font-size: 0.58rem !important;
      color: var(--ui-muted) !important;
      font-style: italic;
    }

    /* ── Danger zone ── */
    .danger-zone-label {
      color: rgba(255, 90, 90, 0.75) !important;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.56rem !important;
    }

    .danger-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 75, 75, 0.38);
      background: rgba(255, 60, 60, 0.06);
      margin: 2px 0 4px;
    }

    .danger-desc {
      margin: 0;
      font-size: 0.6rem;
      color: var(--ui-muted);
      line-height: 1.4;
      flex: 1;
    }

    .danger-btn {
      appearance: none;
      flex: 0 0 auto;
      border: 1px solid rgba(255, 75, 75, 0.55);
      background: rgba(255, 60, 60, 0.1);
      color: rgba(255, 110, 110, 0.9);
      border-radius: 10px;
      padding: 8px 12px;
      font: inherit;
      font-size: 0.62rem;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease;
    }

    .danger-btn:hover {
      background: rgba(255, 60, 60, 0.18);
      border-color: rgba(255, 75, 75, 0.75);
    }

    /* ── Danger modal ── */
    .danger-modal {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .danger-modal-box {
      width: min(88vw, 340px);
      padding: 22px 20px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255, 75, 75, 0.45);
      background: rgba(18, 10, 10, 0.96);
      box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,60,60,0.1) inset;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .danger-modal-title {
      margin: 0;
      font-size: 0.82rem;
      font-weight: 700;
      color: rgba(255,110,110,0.95);
      letter-spacing: -0.02em;
    }

    .danger-modal-desc {
      margin: 0;
      font-size: 0.66rem;
      color: rgba(255,248,241,0.7);
      line-height: 1.5;
    }

    .danger-modal-phrase-hint {
      margin: 0;
      font-size: 0.58rem;
      color: rgba(255,248,241,0.5);
    }

    .danger-modal-phrase {
      margin: 0;
      font-size: 0.68rem;
      font-weight: 700;
      color: rgba(255,248,241,0.92);
      letter-spacing: -0.01em;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      user-select: text;
      -webkit-user-select: text;
    }

    .danger-modal-input {
      width: 100%;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,75,75,0.35);
      background: rgba(255,255,255,0.05);
      color: rgba(255,248,241,0.95);
      font: inherit;
      font-size: 0.68rem;
      outline: none;
      transition: border-color 140ms ease;
      -webkit-user-select: text;
      user-select: text;
    }

    .danger-modal-input:focus {
      border-color: rgba(255,75,75,0.7);
    }

    .danger-modal-input.match {
      border-color: rgba(100,220,130,0.7);
    }

      const r = parseInt(hex.slice(0,2),16);

      const b = parseInt(hex.slice(4,6),16);
      return `rgba(${r},${g},${b},${a})`;
    }

      accent = next;
      const isCustom = (next === "custom");
      const dark     = frame.dataset.uiTheme !== "light";

      if (isCustom && customAccentColor) {
        const hex  = customAccentColor;
        const col  = "#" + hex;
        frame.style.setProperty("--ui-accent",        col);
        frame.style.setProperty("--ui-accent-glow",   hexToRgba(hex, 0.28));
        frame.style.setProperty("--ui-accent-border", hexToRgba(hex, 0.5));
        frame.style.setProperty("--ui-active-bg",     hexToRgba(hex, 0.14));
        frame.style.setProperty("--ui-slider-thumb",  col);
        // 커스텀 버튼 swatch 색도 갱신
        accentCustomBtn.style.setProperty("--accent-swatch", col);
      } else if (!isCustom) {
        const p = accents[accent];
        frame.style.setProperty("--ui-accent",        dark ? p.darkColor  : p.lightColor);
        frame.style.setProperty("--ui-accent-glow",   dark ? p.darkGlow   : p.lightGlow);
        frame.style.setProperty("--ui-accent-border", dark ? p.darkBorder : p.lightBorder);
        frame.style.setProperty("--ui-active-bg",     dark ? p.darkActive : p.lightActive);
        frame.style.setProperty("--ui-slider-thumb",  dark ? p.darkColor  : p.lightColor);
      }

      accentBlue.classList.toggle("active",   accent === "blue");
      accentGreen.classList.toggle("active",  accent === "green");
      accentYellow.classList.toggle("active", accent === "yellow");
      accentPurple.classList.toggle("active", accent === "purple");
      accentRed.classList.toggle("active",    accent === "red");
      accentCustomBtn.classList.toggle("active", isCustom);
    }

    // ── 커스텀 강조색 ─────────────────────────────────────────
    function isValidHex6(v) { return /^[0-9a-fA-F]{6}$/.test(v); }

    function applyCustomAccent(hex) {
      customAccentColor = hex.toLowerCase();
      applyAccent("custom");
      customAccentRow.style.display   = "none";
      customAccentError.style.display = "none";
      customAccentInput.classList.remove("valid");
    }

    function toggleCustomAccentRow() {
      const open = customAccentRow.style.display === "none";
      customAccentRow.style.display   = open ? "flex" : "none";
      customAccentError.style.display = "none";
      if (open) {
        customAccentInput.value = customAccentColor ?? "";
        customAccentInput.classList.toggle("valid", isValidHex6(customAccentInput.value));
        setTimeout(() => customAccentInput.focus(), 40);
      }
    }

    accentCustomBtn.addEventListener("click", toggleCustomAccentRow);

    customAccentInput.addEventListener("input", () => {
      const v = customAccentInput.value.replace(/[^0-9a-fA-F]/g,"");
      customAccentInput.value = v;
      customAccentInput.classList.toggle("valid", isValidHex6(v));
      customAccentError.style.display = "none";
    });

    customAccentApply.addEventListener("click", () => {
      const v = customAccentInput.value.trim();
      if (!isValidHex6(v)) {
        customAccentError.textContent   = copy[language].customAccentError;
        customAccentError.style.display = "block";
        return;
      }
      applyCustomAccent(v);
    });

    customAccentInput.addEventListener("keydown", e => {
      if (e.key === "Enter") customAccentApply.click();
    });

    // ── Blur / Opacity ────────────────────────────────────────
    function applyCardBlur(v) {
      cardBlur = v;
      document.documentElement.style.setProperty("--card-blur", `${v}px`);
      blurValue.textContent = `${v}px`;
      blurRange.value = String(v);
    }

    function applyCardOpacity(v) {
      cardOpacity = v;
      document.documentElement.style.setProperty("--card-opacity", (v / 100).toFixed(2));
      opacityValue.textContent = `${v}%`;
      opacityRange.value = String(v);
    }

    // ── Background ────────────────────────────────────────────
    const DEFAULT_BG = "https://images.unsplash.com/photo-1752784153859-4cdd1a474404?auto=format&fit=crop&fm=jpg&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&ixlib=rb-4.1.0&q=80&w=3000";
    const OVERLAY    = "linear-gradient(180deg, rgba(10,12,16,0.12), rgba(10,12,16,0.44))";

    function applyBackground(url) {
      bgLayer.style.backgroundImage    = `${OVERLAY}, url("${url}")`;
      bgLayer.style.backgroundSize     = "cover";
      bgLayer.style.backgroundPosition = "center";
    }

    function resetBackground() {
      if (customBgUrl) { URL.revokeObjectURL(customBgUrl); customBgUrl = null; }
      applyBackground(DEFAULT_BG);
    }

    // ── Upgrade ───────────────────────────────────────────────
    function getUpgradeCost() {
      return Math.floor(baseUpgradeCost * Math.pow(1.6, productionLevel));
    }

    function buyUpgrade() {
      const cost = getUpgradeCost();
      if (Math.floor(time) < cost) return;
      time -= cost;
      productionLevel += 1;
      productionRate  += 1;
      render();
    }

    // ── Tab switching ─────────────────────────────────────────
    function switchTab(tab) {
      const isMain = tab === "main";
      tabMain.classList.toggle("active",    isMain);
      tabUpgrade.classList.toggle("active", !isMain);
      panelMain.classList.toggle("active",    isMain);
      panelUpgrade.classList.toggle("active", !isMain);
    }

    // ── Events ────────────────────────────────────────────────
    settingsToggle.addEventListener("click", () => setSettingsOpen(!settingsRoot.classList.contains("open")));
    settingsClose.addEventListener("click",  () => setSettingsOpen(false));

    langKo.addEventListener("click",     () => applyLanguage("ko"));
    langEn.addEventListener("click",     () => applyLanguage("en"));
    themeDark.addEventListener("click",  () => applyTheme("dark"));
    themeLight.addEventListener("click", () => applyTheme("light"));

    accentBlue.addEventListener("click",   () => applyAccent("blue"));
    accentGreen.addEventListener("click",  () => applyAccent("green"));
    accentYellow.addEventListener("click", () => applyAccent("yellow"));
    accentPurple.addEventListener("click", () => applyAccent("purple"));
    accentRed.addEventListener("click",    () => applyAccent("red"));

    blurRange.addEventListener("input",    e => applyCardBlur(Number(e.target.value)));
    opacityRange.addEventListener("input", e => applyCardOpacity(Number(e.target.value)));

    upgradeButton.addEventListener("click", buyUpgrade);

    tabMain.addEventListener("click",    () => switchTab("main"));
    tabUpgrade.addEventListener("click", () => switchTab("upgrade"));

    bgUploadBtn.addEventListener("click", () => bgFileInput.click());
    bgFileInput.addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;
      if (customBgUrl) URL.revokeObjectURL(customBgUrl);
      customBgUrl = URL.createObjectURL(file);
      applyBackground(customBgUrl);
      bgFileInput.value = "";
    });
    bgResetBtn.addEventListener("click", resetBackground);

    autosaveOnBtn.addEventListener("click",  () => applyAutosaveEnabled(true));
    autosaveOffBtn.addEventListener("click", () => applyAutosaveEnabled(false));
    autosaveRange.addEventListener("input",  e  => applyAutosaveInterval(Number(e.target.value)));

    document.addEventListener("click", e => {
      if (!settingsRoot.contains(e.target) && !dangerModal.contains(e.target)) setSettingsOpen(false);
    });

    // ── Save / Load ───────────────────────────────────────────
    const SAVE_PREFIX   = "timecollector_slot_";
    const NUM_SLOTS     = 3;
    let statusTimer     = null;

    function buildSaveData() {
      return {
        time, productionRate, productionLevel,
        language, cardTheme, accent, cardBlur, cardOpacity,
        customAccentColor,
        savedAt: Date.now(),
      };
    }

    // ── Autosave ──────────────────────────────────────────────
    function doAutosave() {
      try {
        localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(buildSaveData()));
        lastAutosaveAt = Date.now();
        updateAutosaveHint();
      } catch(e) { /* storage full or unavailable */ }
    }

    function updateAutosaveHint() {
      if (!autosaveEnabled) {
        autosaveHint.textContent = copy[language].autosaveNever;
        return;
      }
      if (!lastAutosaveAt) {
        autosaveHint.textContent = copy[language].autosaveNever;
        return;
      }
      const elapsed = Math.round((Date.now() - lastAutosaveAt) / 1000);
      autosaveHint.textContent = copy[language].autosaveLastFmt(elapsed);
    }

    function startAutosaveTimer() {
      if (autosaveTimer) clearInterval(autosaveTimer);
      if (!autosaveEnabled) return;
      autosaveTimer = setInterval(doAutosave, autosaveInterval * 1000);
    }

    function applyAutosaveEnabled(enabled) {
      autosaveEnabled = enabled;
      autosaveOnBtn.classList.toggle("active",  autosaveEnabled);
      autosaveOffBtn.classList.toggle("active", !autosaveEnabled);
      autosaveIntervalGroup.style.opacity = autosaveEnabled ? "1" : "0.38";
      autosaveIntervalGroup.style.pointerEvents = autosaveEnabled ? "" : "none";
      updateAutosaveHint();
      startAutosaveTimer();
      saveAutosaveSettings();
    }

    function applyAutosaveInterval(sec) {
      autosaveInterval = sec;
      const t = copy[language];
      autosaveValue.textContent = `${sec}${t.autosaveSec}`;
      autosaveRange.value = String(sec);
      startAutosaveTimer();
      saveAutosaveSettings();
    }

    function saveAutosaveSettings() {
      try {
        localStorage.setItem(AUTOSAVE_SETTINGS_KEY, JSON.stringify({ autosaveEnabled, autosaveInterval }));
      } catch(e) {}
    }

    function loadAutosaveSettings() {
      try {
        const raw = localStorage.getItem(AUTOSAVE_SETTINGS_KEY);
        if (!raw) return;
        const s = JSON.parse(raw);
        if (typeof s.autosaveEnabled  === "boolean") autosaveEnabled  = s.autosaveEnabled;
        if (typeof s.autosaveInterval === "number")  autosaveInterval = s.autosaveInterval;
      } catch(e) {}
    }

    // ── Autosave hint 1초마다 갱신 ────────────────────────────
    function startHintRefresh() {
      setInterval(updateAutosaveHint, 1000);
    }

    // ── 시작 시 자동저장 데이터 불러오기 ─────────────────────
    function tryLoadAutosave() {
      try {
        const raw = localStorage.getItem(AUTOSAVE_KEY);
        if (!raw) return false;
        const d = JSON.parse(raw);
        applyLoadData(d);
        lastAutosaveAt = d.savedAt ?? null;
        return true;
      } catch(e) { return false; }
    }

    function applyLoadData(d) {
      time            = d.time            ?? 0;
      productionRate  = d.productionRate  ?? 1;
      productionLevel = d.productionLevel ?? 0;
      if (d.customAccentColor) customAccentColor = d.customAccentColor;
      applyLanguage(d.language   ?? "ko");
      applyTheme(d.cardTheme     ?? "dark");
      applyAccent(d.accent       ?? "yellow");
      applyCardBlur(d.cardBlur   ?? 14);
      applyCardOpacity(d.cardOpacity ?? 42);
      render();
    }

    function getSlotData(slot) {
      try {
        const raw = localStorage.getItem(SAVE_PREFIX + slot);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    function formatSlotTime(d) {
      if (!d) return "—";
      return Math.floor(d.time).toLocaleString();
    }

    function showStatus(msg) {
      saveStatus.textContent = msg;
      if (statusTimer) clearTimeout(statusTimer);
      statusTimer = setTimeout(() => { saveStatus.textContent = ""; }, 2200);
    }

    function renderSaveSlots() {
      const t = copy[language];
      saveLoadLabel.textContent = t.saveLoad;
      autosaveLabel.textContent = t.autosave;
      autosaveIntervalLabel.textContent = t.autosaveInterval;
      autosaveOnBtn.textContent  = t.autosaveOn;
      autosaveOffBtn.textContent = t.autosaveOff;
      autosaveValue.textContent  = `${autosaveInterval}${t.autosaveSec}`;
      updateAutosaveHint();
      dangerDesc.textContent      = t.dangerDesc;
      gameResetBtn.textContent    = t.dangerBtn;
      saveSlotGrid.innerHTML = "";
      for (let i = 1; i <= NUM_SLOTS; i++) {
        const d = getSlotData(i);
        const slot = document.createElement("div");
        slot.className = "save-slot";
        slot.innerHTML = `
          <span class="save-slot-label">${t.saveInfo} ${i}</span>
          <span class="save-slot-time">${formatSlotTime(d)}</span>
          <div class="save-slot-btns">
            <button class="is-save" data-slot="${i}" data-action="save">${t.saveBtn}</button>
            <button data-slot="${i}" data-action="load" ${d ? "" : "disabled"}>${t.loadBtn}</button>
          </div>`;
        saveSlotGrid.appendChild(slot);
      }
      gameResetBtn.textContent = t.resetBtn;
    }

    saveSlotGrid.addEventListener("click", e => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;
      const slot   = btn.dataset.slot;
      const action = btn.dataset.action;
      const t      = copy[language];
      if (action === "save") {
        localStorage.setItem(SAVE_PREFIX + slot, JSON.stringify(buildSaveData()));
        showStatus(t.saveOk);
        renderSaveSlots();
      } else if (action === "load") {
        const d = getSlotData(slot);
        if (d) { applyLoadData(d); showStatus(t.loadOk); renderSaveSlots(); }
        else    { showStatus(t.loadNone); }
      }
    });

    // ── Danger zone modal ─────────────────────────────────────
    function openDangerModal() {
      const t = copy[language];
      dangerModalTitle.textContent   = t.dangerBtn;
      dangerModalDesc.textContent    = t.dangerDesc;
      dangerModalHint.textContent    = t.dangerPrompt + ":";
      dangerModalPhrase.textContent  = t.dangerPhrase;
      dangerModalInput.placeholder   = t.dangerPhrase;
      dangerModalCancel.textContent  = t.dangerCancel;
      dangerModalConfirm.textContent = t.dangerConfirm;
      dangerModalInput.value         = "";
      dangerModalError.textContent   = "";
      dangerModalConfirm.disabled    = true;
      dangerModalInput.classList.remove("match");
      dangerModal.style.display      = "grid";
      setTimeout(() => dangerModalInput.focus(), 60);
    }

    function closeDangerModal() {
      dangerModal.style.display = "none";
    }

    gameResetBtn.addEventListener("click", openDangerModal);

    dangerModalCancel.addEventListener("click", closeDangerModal);

    dangerModalInput.addEventListener("input", () => {
      const t       = copy[language];
      const val     = dangerModalInput.value;
      const match   = val === t.dangerPhrase;
      dangerModalConfirm.disabled = !match;
      dangerModalInput.classList.toggle("match", match);
      dangerModalError.textContent = "";
    });

    dangerModalConfirm.addEventListener("click", () => {
      const t = copy[language];
      if (dangerModalInput.value !== t.dangerPhrase) {
        dangerModalError.textContent = t.dangerWrong;
        return;
      }
      // 실제 초기화
      time = 0; productionRate = 1; productionLevel = 0;
      try { localStorage.removeItem(AUTOSAVE_KEY); } catch(e) {}
      lastAutosaveAt = null;
      render();
      updateAutosaveHint();
      renderSaveSlots();
      closeDangerModal();
      showStatus("✓");
    });

    dangerModal.addEventListener("click", e => {
      if (e.target === dangerModal) closeDangerModal();
    });

    document.addEventListener("keydown", e => {
      if (e.key === "Escape") {
        if (dangerModal.style.display !== "none") { closeDangerModal(); return; }
        setSettingsOpen(false);
      }
    });

    // ── Bootstrap ─────────────────────────────────────────────
    loadAutosaveSettings();           // 자동저장 설정 먼저 복원
    resetBackground();
    if (!tryLoadAutosave()) {         // 자동저장 데이터 복원 시도
      applyLanguage("ko");
      applyTheme("dark");
      applyAccent("yellow");
      applyCardBlur(14);
      applyCardOpacity(42);
    }
    applyAutosaveEnabled(autosaveEnabled);
    applyAutosaveInterval(autosaveInterval);
    renderSaveSlots();
    render();
    startHintRefresh();

    setInterval(() => { time += productionRate; render(); }, 1000);
  </script>
</body>
</html>
